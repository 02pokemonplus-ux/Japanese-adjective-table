html { scroll-behavior: smooth; }

body.dark .ref-adj-header.i { background: #162436; color: #7ab8f0; border-color: #2a4060; }
body.dark .ref-adj-header.na { background: #2d1a08; color: #f0a870; border-color: #5a3010; }
body.dark .ref-control-btn { background: #1a1c26; border-color: #3a3d52; color: #aaa; }

body.dark .ft-base-na { background: #2d1a08; color: #f0a870; }

body.dark .btn-restart { background: #e8e8f0; color: #1a1c26; }

/* ══ GRAYSCALE MODE ══ */
body.grayscale {
  filter: grayscale(1);
}
body.grayscale.dark {
  filter: grayscale(1);
}

/* ══ Theme toggle button ══ */
.theme-toggle-group {
  display: flex;
  align-items: center;
}
.theme-btn {
  border: 1.5px solid #ddd;
  background: #fff;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #555;
  transition: all 0.15s;
}
.theme-btn:hover { border-color: #aaa; background: #f5f5f5; }
.theme-btn svg { width: 17px; height: 17px; }
body.dark .theme-btn { background: #1a1c26; border-color: #3a3d52; color: #ccc; }
body.dark .theme-btn:hover { border-color: #666; background: #23253a; }

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 1px solid #e4e6ef;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.header h1 { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; flex: 1; min-width: 160px; }
.header-stats { display: flex; gap: 10px; align-items: center; font-size: 0.82rem; color: #666; }
.stat-badge { background: #f0f2f7; border-radius: 999px; padding: 3px 10px; font-weight: 600; }
.stat-badge.correct { background: #e6f9f0; color: #0a7a4a; }
.stat-badge.wrong { background: #fde8e8; color: #c0392b; }

/* ── Settings Panel ── */
.settings-bar {
  background: #fff;
  border-bottom: 1px solid #e4e6ef;
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.settings-label { font-size: 0.8rem; font-weight: 700; color: #888; white-space: nowrap; }

.pill-btn {
  border: 2px solid #ddd;
  background: #fff;
  border-radius: 999px;
  padding: 4px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  color: #555;
  white-space: nowrap;
}
.pill-btn:hover { border-color: #aaa; }
.pill-btn.active-i { background: #e8f4fd; border-color: #4a90d9; color: #2563a8; }
.pill-btn.active-na { background: #fef3e8; border-color: #e07a2f; color: #b85c10; }
.pill-btn.active-both { background: #f0e8fd; border-color: #8a5fd9; color: #5a2ba8; }
.pill-btn.active-mode { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }

.divider-v { width: 1px; height: 24px; background: #e4e6ef; margin: 0 4px; }

/* ── Form Filter ── */
.form-filter {
  background: #fff;
  border-bottom: 1px solid #e4e6ef;
  padding: 8px 20px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.form-chip {
  border: 1.5px solid #ddd;
  background: #fff;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.78rem;
  cursor: pointer;
  color: #666;
  transition: all 0.13s;
  user-select: none;
}
.form-chip.selected { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
.select-all-btn {
  font-size: 0.75rem;
  color: #4a90d9;
  cursor: pointer;
  text-decoration: underline;
  margin-left: 4px;
  white-space: nowrap;
}

/* ── Main Area ── */
.main { padding: 24px 20px; max-width: 720px; margin: 0 auto; }

/* ── Flashcard Mode ── */
.flashcard-wrap { perspective: 1000px; }
.flashcard {
  width: 100%;
  min-height: 200px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: box-shadow 0.2s;
  position: relative;
}
.flashcard:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.13); }
.card-prompt { font-size: 0.82rem; color: #aaa; margin-bottom: 8px; letter-spacing: 0.05em; }
.card-word { font-size: 2.4rem; font-weight: 700; color: #1a1a2e; letter-spacing: 0.04em; margin-bottom: 6px; }
.card-reading { font-size: 1rem; color: #888; margin-bottom: 6px; }
.card-zh { font-size: 1rem; color: #555; }
.card-target {
  margin-top: 18px;
  font-size: 1rem;
  color: #4a90d9;
  font-weight: 600;
  background: #e8f4fd;
  border-radius: 8px;
  padding: 6px 16px;
}
.card-target.na { color: #b85c10; background: #fef3e8; }
.card-answer {
  display: none;
  margin-top: 20px;
  width: 100%;
  border-top: 1px dashed #eee;
  padding-top: 18px;
  text-align: center;
}
.card-answer.show { display: block; }
.answer-big { font-size: 2rem; font-weight: 700; color: #0a7a4a; margin-bottom: 6px; }
.answer-note { font-size: 0.85rem; color: #888; }
.card-tap { font-size: 0.78rem; color: #ccc; margin-top: 14px; }
.card-example {
  margin-top: 16px;
  width: 100%;
  background: #f7f8fc;
  border-radius: 10px;
  padding: 12px 16px;
  text-align: left;
}
.example-jp { font-size: 0.95rem; color: #444; line-height: 1.6; }
.example-zh { font-size: 0.82rem; color: #999; margin-top: 4px; }
.example-fill { color: #0a7a4a; font-weight: 700; border-bottom: 2px solid #0a7a4a; padding: 0 2px; }
.example-row { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
.example-row .example-jp { flex: 1; }
.speak-btn {
  flex-shrink: 0;
  border: none;
  background: #e8f4fd;
  color: #2563a8;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.speak-btn:hover { background: #c5e0f8; }
.speak-btn:active { transform: scale(0.92); }

/* ── Furigana hover/tap tooltip ── */
.furigana-term {
  position: relative;
  cursor: help;
  border-bottom: 1px dotted #999;
  -webkit-tap-highlight-color: transparent;
}
.furigana-term::after {
  content: attr(data-reading);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 6px);
  transform: translateX(-50%) translateY(4px);
  background: #1a1a2e;
  color: #fff;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s, transform 0.15s;
  z-index: 20;
  letter-spacing: 0.02em;
}
.furigana-term::before {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 100%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #1a1a2e;
  margin-bottom: -4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 20;
}
.furigana-term:hover::after,
.furigana-term:hover::before,
.furigana-term.show-tip::after,
.furigana-term.show-tip::before {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
body.dark .furigana-term { border-bottom-color: #555; }
body.dark .furigana-term::after { background: #e8e8f0; color: #1a1c26; }
body.dark .furigana-term::before { border-top-color: #e8e8f0; }

.btn-row { display: flex; gap: 12px; margin-top: 18px; justify-content: center; }
.btn-wrong { background: #fde8e8; color: #c0392b; border: none; border-radius: 10px; padding: 10px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-wrong:hover { background: #f5c6c6; }
.btn-correct { background: #e6f9f0; color: #0a7a4a; border: none; border-radius: 10px; padding: 10px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-correct:hover { background: #b8edcf; }

/* ── Quiz Mode ── */
.quiz-card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 28px 24px;
}
.quiz-sentence { font-size: 1.15rem; line-height: 1.9; margin-bottom: 20px; color: #333; }
.quiz-blank { display: inline-block; min-width: 120px; border-bottom: 2px solid #4a90d9; margin: 0 4px; text-align: center; vertical-align: bottom; }
.quiz-target-label { font-size: 0.82rem; color: #888; margin-bottom: 14px; }
.quiz-target-form { display: inline-block; font-weight: 700; color: #4a90d9; background: #e8f4fd; border-radius: 6px; padding: 2px 10px; }
.quiz-target-form.na { color: #b85c10; background: #fef3e8; }
.quiz-input {
  width: 100%;
  border: 2px solid #ddd;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 1.1rem;
  outline: none;
  transition: border 0.15s;
  font-family: inherit;
  color: #1a1a2e;
}
.quiz-input:focus { border-color: #4a90d9; }
.quiz-input.correct-input { border-color: #0a7a4a; background: #e6f9f0; }
.quiz-input.wrong-input { border-color: #c0392b; background: #fde8e8; }
.quiz-feedback { margin-top: 12px; font-size: 0.95rem; min-height: 24px; font-weight: 600; }
.quiz-feedback.ok { color: #0a7a4a; }
.quiz-feedback.ng { color: #c0392b; }
.quiz-answer-reveal { font-size: 0.9rem; color: #555; margin-top: 6px; }

/* ── CN→JP Mode ── */
.cnjp-card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 28px 24px;
  text-align: center;
}
.cnjp-word { font-size: 2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
.cnjp-hint { font-size: 0.85rem; color: #aaa; margin-bottom: 4px; }
.cnjp-form-label { font-size: 0.9rem; color: #555; margin-bottom: 18px; }
.cnjp-form-badge { display: inline-block; font-weight: 700; background: #e8f4fd; color: #2563a8; border-radius: 6px; padding: 2px 10px; }
.cnjp-form-badge.na { background: #fef3e8; color: #b85c10; }

/* ── Reference Mode ── */
.ref-search {
  width: 100%;
  border: 2px solid #ddd;
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 1rem;
  outline: none;
  margin-bottom: 16px;
  font-family: inherit;
  transition: border 0.15s;
}
.ref-search:focus { border-color: #4a90d9; }
.ref-table-wrap { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
.ref-adj-header {
  padding: 12px 18px;
  font-weight: 700;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ref-adj-header.i { background: #e8f4fd; color: #2563a8; border-bottom: 1px solid #b8d9f5; }
.ref-adj-header.na { background: #fef3e8; color: #b85c10; border-bottom: 1px solid #f5c89a; }
.ref-adj-header { cursor: pointer; user-select: none; justify-content: space-between; transition: background 0.15s; }
.ref-adj-header:hover { filter: brightness(0.97); }
.ref-adj-header .ref-header-text { display: flex; align-items: center; gap: 8px; }
.ref-toggle-icon { font-size: 0.8rem; transition: transform 0.2s; color: inherit; opacity: 0.6; }
.ref-table-wrap.collapsed .ref-toggle-icon { transform: rotate(-90deg); }
.ref-table-wrap.collapsed table { display: none; }
.ref-controls { display: flex; gap: 8px; margin-bottom: 12px; }
.ref-control-btn {
  border: 1.5px solid #ddd;
  background: #fff;
  border-radius: 8px;
  padding: 5px 14px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  color: #555;
  transition: all 0.15s;
}
.ref-control-btn:hover { border-color: #aaa; background: #f5f5f5; }
.ref-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.ref-table th { padding: 8px 12px; background: #f5f6fa; text-align: left; color: #666; font-weight: 700; border-bottom: 1px solid #eee; }
.ref-table td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; }
.ref-table tr:last-child td { border-bottom: none; }
.ref-table tr:hover td { background: #fafbff; }
.form-tag {
  display: inline-block;
  font-size: 0.7rem;
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 700;
  white-space: nowrap;
}
.ft-neg { background: #fde8e8; color: #c0392b; }
.ft-past { background: #e8fde8; color: #1a7a2f; }
.ft-pastneg { background: #fef9e8; color: #a07010; }
.ft-other { background: #f0e8fd; color: #6a2ba8; }
.ft-base { background: #e8f4fd; color: #2563a8; }
.ft-base-na { background: #fef3e8; color: #b85c10; }

/* ── Progress bar ── */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.progress-bar-bg { flex: 1; height: 8px; background: #e4e6ef; border-radius: 999px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4a90d9, #6ab0f5); border-radius: 999px; transition: width 0.3s; }
.progress-label { font-size: 0.8rem; color: #888; white-space: nowrap; }

/* ── Empty / Done ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .big { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 1rem; }
.done-state { text-align: center; padding: 40px 20px; }
.done-state .big { font-size: 2.6rem; font-weight: 700; color: #0a7a4a; margin-bottom: 10px; }
.done-state h2 { font-size: 1.4rem; margin-bottom: 8px; }
.done-state p { color: #666; margin-bottom: 20px; }
.btn-restart { background: #1a1a2e; color: #fff; border: none; border-radius: 10px; padding: 12px 32px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.btn-restart:hover { background: #2d2d4e; }
.btn-retry-wrong { background: #fde8e8; color: #c0392b; border: none; border-radius: 10px; padding: 12px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-right: 10px; }

/* submit btn */
.btn-submit {
  background: #1a1a2e; color: #fff; border: none; border-radius: 10px;
  padding: 10px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
  margin-top: 14px; transition: background 0.15s;
}
.btn-submit:hover { background: #2d2d4e; }
.btn-next {
  background: #e8f4fd; color: #2563a8; border: none; border-radius: 10px;
  padding: 10px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
  margin-top: 14px; margin-left: 10px; transition: background 0.15s; display: none;
}
.btn-next:hover { background: #c5e0f8; }

@media (max-width: 500px) {
  .card-word { font-size: 1.9rem; }
  .main { padding: 16px 12px; }
  .settings-bar, .form-filter { padding: 8px 12px; }
  .header { padding: 10px 12px; }
}

<body>

<!-- Header -->
<div class="header">
  <h1>日文形容詞變化練習</h1>
  <div class="header-stats">
    <span class="stat-badge correct" id="stat-correct">✓ 0</span>
    <span class="stat-badge wrong" id="stat-wrong">✗ 0</span>
    <span class="stat-badge" id="stat-total">共 0 題</span>
  </div>
  <div class="theme-toggle-group">
    <button class="theme-btn" id="theme-toggle" onclick="cycleTheme()" title="切換主題" aria-label="切換主題">
      <span id="theme-icon"></span>
    </button>
  </div>
</div>

<!-- Settings: Type + Mode -->
<div class="settings-bar">
  <span class="settings-label">範圍</span>
  <button class="pill-btn active-i" id="type-i" onclick="setType('i')">い形容詞</button>
  <button class="pill-btn" id="type-na" onclick="setType('na')">な形容詞</button>
  <button class="pill-btn" id="type-both" onclick="setType('both')">全部混合</button>
  <div class="divider-v"></div>
  <span class="settings-label">模式</span>
  <button class="pill-btn active-mode" id="mode-flash" onclick="setMode('flash')">單字卡</button>
  <button class="pill-btn" id="mode-quiz" onclick="setMode('quiz')">填空</button>
  <button class="pill-btn" id="mode-cnjp" onclick="setMode('cnjp')">中翻日</button>
  <button class="pill-btn" id="mode-ref" onclick="setMode('ref')">參考表</button>
</div>

<!-- Form filter (hidden in ref mode) -->
<div class="form-filter" id="form-filter">
  <span class="settings-label">變化形</span>
  <span class="form-chip selected" data-form="neg" onclick="toggleForm(this)">否定</span>
  <span class="form-chip selected" data-form="past" onclick="toggleForm(this)">過去</span>
  <span class="form-chip selected" data-form="pastneg" onclick="toggleForm(this)">過去否定</span>
  <span class="form-chip selected" data-form="te" onclick="toggleForm(this)">て形</span>
  <span class="form-chip selected" data-form="adv" onclick="toggleForm(this)">副詞形</span>
  <span class="form-chip selected" data-form="hyp" onclick="toggleForm(this)">假設形</span>
  <span class="form-chip selected" data-form="naru" onclick="toggleForm(this)">〜くなる/になる</span>
  <span class="form-chip selected" data-form="sou" onclick="toggleForm(this)">〜そう</span>
  <span class="form-chip selected" data-form="sugiru" onclick="toggleForm(this)">〜すぎる</span>
  <span class="form-chip selected" data-form="sa" onclick="toggleForm(this)">〜さ</span>
  <span class="select-all-btn" onclick="selectAllForms()">全選</span>
</div>

<!-- Main content -->
<div class="main" id="main-area"></div>

// Conjugation generators
function conjugateI(adj, form) {
  // base 形 (辭書形) always uses the original written form (kanji if present)
  if (form === 'base') return adj.w;

  // Derive the conjugation stem preferring kanji: if adj.w ends in 'い' and
  // isn't the irregular 'いい', strip the trailing い from the kanji form.
  // This keeps kanji throughout conjugations (e.g. 暑い -> 暑くない, not あつくない).
  let s;
  if (adj.special) {
    s = adj.stem; // いい -> よ (irregular, no kanji to preserve)
  } else if (adj.w.endsWith('い')) {
    s = adj.w.slice(0, -1);
  } else {
    s = adj.stem; // fallback safety net
  }

  switch(form) {
    case 'neg':     return s + 'くない';
    case 'negd':    return s + 'くないです';
    case 'past':    return s + 'かった';
    case 'pastd':   return s + 'かったです';
    case 'pastneg': return s + 'くなかった';
    case 'pastnegd':return s + 'くなかったです';
    case 'te':      return s + 'くて';
    case 'adv':     return s + 'く';
    case 'hyp':     return s + 'ければ';
    case 'naru':    return s + 'くなる';
    case 'sou':     return s + 'そう';
    case 'sugiru':  return s + 'すぎる';
    case 'sa':      return s + 'さ';
    default: return adj.w;
  }
}

function conjugateNA(adj, form) {
  const s = adj.w;
  switch(form) {
    case 'neg':     return s + 'ではない';
    case 'negd':    return s + 'ではありません';
    case 'past':    return s + 'だった';
    case 'pastd':   return s + 'でした';
    case 'pastneg': return s + 'ではなかった';
    case 'pastnegd':return s + 'ではありませんでした';
    case 'te':      return s + 'で';
    case 'adv':     return s + 'に';
    case 'hyp':     return s + 'なら';
    case 'naru':    return s + 'になる';
    case 'sou':     return s + 'そう';
    case 'sugiru':  return s + 'すぎる';
    case 'sa':      return s + 'さ';
    case 'base':    return s + 'だ';
    default: return s + 'だ';
  }
}

const FURIGANA_KEYS = Object.keys(FURIGANA_DICT).sort((a, b) => b.length - a.length);

// Wrap kanji substrings in a sentence with hoverable/long-press spans showing furigana
function annotateFurigana(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const k of FURIGANA_KEYS) {
      if (text.startsWith(k, i)) {
        const reading = FURIGANA_DICT[k];
        result += `<span class="furigana-term" data-reading="${reading}" tabindex="0">${k}</span>`;
        i += k.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      result += text[i];
      i++;
    }
  }
  return result;
}

// Touch devices have no :hover, so use a long-press (≈350ms) to toggle the
// tooltip via a 'show-tip' class. Uses event delegation so dynamically
// rendered furigana-term spans (re-created on every render() call) work
// without needing to re-bind listeners each time.
(function setupFuriganaLongPress() {
  let pressTimer = null;
  let activeEl = null;

  function clearActive() {
    if (activeEl) activeEl.classList.remove('show-tip');
    activeEl = null;
  }

  document.addEventListener('touchstart', (e) => {
    const term = e.target.closest && e.target.closest('.furigana-term');
    if (!term) {
      if (activeEl) clearActive();
      return;
    }
    clearActive();
    pressTimer = setTimeout(() => {
      term.classList.add('show-tip');
      activeEl = term;
    }, 350);
  }, { passive: true });

  document.addEventListener('touchend', () => {
    clearTimeout(pressTimer);
  }, { passive: true });

  document.addEventListener('touchmove', () => {
    clearTimeout(pressTimer);
  }, { passive: true });
})();

  pastnegd: '過去否定（丁寧體）',
  te: 'て形',
  adv: '副詞形（〜く／〜に）',
  hyp: '假設形（〜ければ／〜なら）',
  naru: '〜くなる／〜になる',

// Form chip → forms mapping
const CHIP_FORMS = {
  neg:    ['neg','negd'],
  past:   ['past','pastd'],
  pastneg:['pastneg','pastnegd'],
  te:     ['te'],
  adv:    ['adv'],
  hyp:    ['hyp'],
  naru:   ['naru'],
  sou:    ['sou'],

  sa:     ['sa'],

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentType = 'i';
let currentMode = 'flash';
let selectedChips = new Set(['neg','past','pastneg','te','adv','hyp','naru','sou','sugiru','sa']);
let queue = [];
let currentIdx = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongList = [];
let cardFlipped = false;
let answered = false;

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function getEnabledForms() {
  let forms = [];
  selectedChips.forEach(chip => {
    CHIP_FORMS[chip].forEach(f => forms.push(f));
  });
  return forms;
}

function buildQueue(retryWrong = false) {
  let adjs = [];
  if (currentType === 'i') adjs = I_ADJ.map(a => ({...a, type:'i'}));
  else if (currentType === 'na') adjs = NA_ADJ.map(a => ({...a, type:'na'}));
  else adjs = [...I_ADJ.map(a=>({...a,type:'i'})), ...NA_ADJ.map(a=>({...a,type:'na'}))];

  const forms = getEnabledForms();
  if (forms.length === 0) return [];

  let items = [];
  if (retryWrong) {
    items = [...wrongList];
  } else {
    adjs.forEach(adj => {
      forms.forEach(form => {
        items.push({adj, form});
      });
    });
    // shuffle
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
  }
  return items;
}

function getAnswer(item) {
  if (item.adj.type === 'i') return conjugateI(item.adj, item.form);
  else return conjugateNA(item.adj, item.form);
}

function updateStats() {
  document.getElementById('stat-correct').textContent = '✓ ' + correctCount;
  document.getElementById('stat-wrong').textContent = '✗ ' + wrongCount;
  document.getElementById('stat-total').textContent = '共 ' + queue.length + ' 題';
}

// ══════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════
function setType(t) {
  currentType = t;
  ['i','na','both'].forEach(x => {
    const btn = document.getElementById('type-'+x);
    btn.className = 'pill-btn';
    if (x === t) {
      if (t==='i') btn.classList.add('active-i');
      else if (t==='na') btn.classList.add('active-na');
      else btn.classList.add('active-both');
    }
  });
  restart();
}

function setMode(m) {
  currentMode = m;
  ['flash','quiz','cnjp','ref'].forEach(x => {
    const btn = document.getElementById('mode-'+x);
    btn.className = 'pill-btn';
    if (x === m) btn.classList.add('active-mode');
  });
  const ff = document.getElementById('form-filter');
  ff.style.display = m === 'ref' ? 'none' : 'flex';
  restart();
}

function toggleForm(el) {
  const f = el.dataset.form;
  if (selectedChips.has(f)) {
    if (selectedChips.size <= 1) return;
    selectedChips.delete(f);
    el.classList.remove('selected');
  } else {
    selectedChips.add(f);
    el.classList.add('selected');
  }
  restart();
}

function selectAllForms() {
  document.querySelectorAll('.form-chip').forEach(el => {
    selectedChips.add(el.dataset.form);
    el.classList.add('selected');
  });
  restart();
}

function restart(retryWrong = false) {
  if (!retryWrong) {
    correctCount = 0;
    wrongCount = 0;
    wrongList = [];
  }
  queue = buildQueue(retryWrong);
  currentIdx = 0;
  answered = false;
  cardFlipped = false;
  updateStats();
  render();
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  const area = document.getElementById('main-area');
  if (currentMode === 'ref') { renderRef(area); return; }
  if (queue.length === 0) {
    area.innerHTML = `<div class="empty-state"><p>請至少選擇一種變化形！</p></div>`;
    return;
  }
  if (currentIdx >= queue.length) { renderDone(area); return; }

  const progress = `<div class="progress-row">
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${(currentIdx/queue.length*100).toFixed(1)}%"></div></div>
    <span class="progress-label">${currentIdx}／${queue.length}</span>
  </div>`;

  if (currentMode === 'flash') renderFlash(area, progress);
  else if (currentMode === 'quiz') renderQuiz(area, progress);
  else if (currentMode === 'cnjp') renderCnjp(area, progress);
}

// Map a conjugation form key to its base example-lookup key (handles 丁寧體 variants)
function exKeyFor(form) {
  const map = {
    neg:'neg', negd:'neg',
    past:'past', pastd:'past',
    pastneg:'pastneg', pastnegd:'pastneg',
    te:'te', adv:'adv', hyp:'hyp',
    naru:'naru', sou:'sou', sugiru:'sugiru', sa:'sa', base:'base'
  };
  return map[form] || form;
}

function getExample(item) {
  const adj = item.adj;
  if (!adj.ex) return null;
  const key = exKeyFor(item.form);
  const ex = adj.ex[key];
  if (!ex) return null;

  // 丁寧體 forms (negd/pastd/pastnegd) reuse the same example template as
  // their plain-form counterparts. Those templates often end the blank with
  // a literal 'です' (e.g. '__です。') written for the plain-form answer.
  // Since the 丁寧體 answer itself already ends in です (楽しくないです),
  // filling it into a 'です'-suffixed template would duplicate です です.
  // Detect that case and strip the redundant trailing です from the template.
  const isTeineiForm = item.form === 'negd' || item.form === 'pastd' || item.form === 'pastnegd';
  if (isTeineiForm && /__です/.test(ex.jp)) {
    return { jp: ex.jp.replace('__です', '__'), zh: ex.zh };
  }
  return ex;
}

// ══════════════════════════════════════════
//  TEXT-TO-SPEECH (例句語音)
// ══════════════════════════════════════════
const SPEAKER_ICON_SVG = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`;

function escapeForJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

let jpVoice = null;
function pickJaVoice() {
  if (typeof window === 'undefined' || !window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang && v.lang.startsWith('ja')) || null;
}
if (typeof window !== 'undefined' && window.speechSynthesis) {
  jpVoice = pickJaVoice();
  window.speechSynthesis.onvoiceschanged = () => { jpVoice = pickJaVoice(); };
}

function speakJP(text) {
  if (typeof window === 'undefined' || !window.speechSynthesis) {
    alert('您的瀏覽器不支援語音播放功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  if (jpVoice) utter.voice = jpVoice;
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
}

function renderFlash(area, progress) {
  const item = queue[currentIdx];
  const adj = item.adj;
  const isNA = adj.type === 'na';
  const answer = getAnswer(item);
  const formLabel = FORM_LABELS[item.form];
  const example = getExample(item);

  let exampleBlockBefore = '';
  let exampleBlockAfter = '';
  if (example) {
    const gapped = example.jp.replace('__', '＿＿＿＿');
    const gappedAnnotated = annotateFurigana(gapped);
    exampleBlockBefore = `<div class="card-example" id="card-example-before">
      <div class="example-jp">${gappedAnnotated}</div>
    </div>`;

    // Annotate the surrounding sentence and the answer separately, then splice
    // together so the <span class="example-fill"> wrapper isn't corrupted by
    // the furigana annotation pass (which only operates on plain text).
    const [beforeBlank, afterBlank] = example.jp.split('__');
    const beforeAnnotated = annotateFurigana(beforeBlank);
    const afterAnnotated = annotateFurigana(afterBlank);
    const answerAnnotated = annotateFurigana(answer);
    const filled = `${beforeAnnotated}<span class="example-fill">${answerAnnotated}</span>${afterAnnotated}`;
    const filledPlain = example.jp.replace('__', answer);
    exampleBlockAfter = `<div class="card-example" id="card-example-after">
      <div class="example-row">
        <div class="example-jp">${filled}</div>
        <button class="speak-btn" onclick="event.stopPropagation(); speakJP('${escapeForJs(filledPlain)}')" title="播放語音" aria-label="播放例句語音">${SPEAKER_ICON_SVG}</button>
      </div>
      <div class="example-zh">${example.zh}</div>
    </div>`;
  }

  area.innerHTML = progress + `
  <div class="flashcard-wrap">
    <div class="flashcard" onclick="flipCard()">
      <div class="card-prompt">請說出變化形</div>
      <div class="card-word">${adj.w}</div>
      <div class="card-reading">${adj.r}</div>
      <div class="card-zh">${adj.zh}</div>
      <div class="card-target ${isNA?'na':''}">${formLabel}</div>
      ${exampleBlockBefore}
      <div class="card-answer" id="card-answer">
        <div class="answer-big">${answer}</div>
        <div class="answer-note">${isNA?'な形容詞':'い形容詞'} ／ ${formLabel}</div>
        ${exampleBlockAfter}
      </div>
      <div class="card-tap" id="card-tap">點擊卡片顯示答案</div>
    </div>
    <div class="btn-row" id="btn-row" style="display:none">
      <button class="btn-wrong" onclick="markWrong()">✗ 不會</button>
      <button class="btn-correct" onclick="markCorrect()">✓ 會了</button>
    </div>
  </div>`;
}

function flipCard() {
  if (cardFlipped) return;
  cardFlipped = true;
  document.getElementById('card-answer').classList.add('show');
  document.getElementById('card-tap').style.display = 'none';
  document.getElementById('btn-row').style.display = 'flex';
  const before = document.getElementById('card-example-before');
  if (before) before.style.display = 'none';
}

function markCorrect() {
  correctCount++;
  currentIdx++;
  cardFlipped = false;
  updateStats();
  render();
}

function markWrong() {
  wrongCount++;
  wrongList.push(queue[currentIdx]);
  currentIdx++;
  cardFlipped = false;
  updateStats();
  render();
}

// Quiz mode
function renderQuiz(area, progress) {
  const item = queue[currentIdx];
  const adj = item.adj;
  const isNA = adj.type === 'na';
  const formLabel = FORM_LABELS[item.form];

  // Build example sentence context
  let sentence = '';
  if (item.form === 'neg' || item.form === 'negd') sentence = `今日は＿＿＿＿。`;
  else if (item.form === 'past' || item.form === 'pastd') sentence = `昨日は＿＿＿＿。`;
  else if (item.form === 'pastneg' || item.form === 'pastnegd') sentence = `昨日は＿＿＿＿。`;
  else if (item.form === 'te') sentence = `＿＿＿＿、とても大変だ。`;
  else if (item.form === 'adv') sentence = `＿＿＿＿なった。`;
  else if (item.form === 'hyp') sentence = `＿＿＿＿、どうぞ。`;
  else if (item.form === 'naru') sentence = `最近＿＿＿＿。`;
  else if (item.form === 'sou') sentence = `あの店は＿＿＿＿だ。`;
  else if (item.form === 'sugiru') sentence = `これは＿＿＿＿。`;
  else if (item.form === 'sa') sentence = `この＿＿＿＿が好きだ。`;
  else sentence = `＿＿＿＿。`;

  area.innerHTML = progress + `
  <div class="quiz-card">
    <div class="quiz-target-label">
      「<strong>${adj.w}</strong>」（${adj.r}）${adj.zh}的
      <span class="quiz-target-form ${isNA?'na':''}">${formLabel}</span>
      是什麼？
    </div>
    <div class="quiz-sentence" style="color:#bbb;font-size:0.9rem;margin-bottom:14px">${sentence}</div>
    <input class="quiz-input" id="quiz-input" type="text" placeholder="輸入答案…" onkeydown="if(event.key==='Enter')checkQuiz()">
    <div><button class="btn-submit" onclick="checkQuiz()">確認</button>
    <button class="btn-next" id="btn-next" onclick="nextQuiz()">下一題 →</button></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="quiz-answer-reveal" id="quiz-reveal"></div>
  </div>`;

  setTimeout(() => { const inp = document.getElementById('quiz-input'); if(inp) inp.focus(); }, 50);
}

function checkQuiz() {
  if (answered) return;
  const item = queue[currentIdx];
  const answer = getAnswer(item);
  const input = document.getElementById('quiz-input');
  const val = input.value.trim();
  const fb = document.getElementById('quiz-feedback');
  const rev = document.getElementById('quiz-reveal');
  const btnNext = document.getElementById('btn-next');

  if (val === answer) {
    input.classList.add('correct-input');
    fb.className = 'quiz-feedback ok';
    fb.textContent = '✓ 正確！';
    correctCount++;
  } else {
    input.classList.add('wrong-input');
    fb.className = 'quiz-feedback ng';
    fb.textContent = '✗ 不正確';
    rev.textContent = `正確答案：${answer}`;
    wrongCount++;
    wrongList.push(item);
  }
  answered = true;
  btnNext.style.display = 'inline-block';
  updateStats();
}

function nextQuiz() {
  currentIdx++;
  answered = false;
  render();
}

// CN→JP mode

// Done screen
function renderDone(area) {
  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
  area.innerHTML = `<div class="done-state">
    <div class="big">${pct}%</div>
    <h2>練習完成！</h2>
    <p>正確 ${correctCount} 題，錯誤 ${wrongCount} 題（正確率 ${pct}%）</p>
    ${wrongCount > 0 ? `<button class="btn-retry-wrong" onclick="restart(true)">重練錯題（${wrongCount}題）</button>` : ''}
    <button class="btn-restart" onclick="restart(false)">重新開始</button>
  </div>`;
}

// ══════════════════════════════════════════
//  REFERENCE TABLE
// ══════════════════════════════════════════
function renderRef(area) {
  const forms = [
    {key:'base', label:'辭書形', tag:'base'},
    {key:'neg', label:'否定（普通）', tag:'neg'},
    {key:'negd', label:'否定（丁寧）', tag:'neg'},
    {key:'past', label:'過去（普通）', tag:'past'},
    {key:'pastd', label:'過去（丁寧）', tag:'past'},
    {key:'pastneg', label:'過去否定（普通）', tag:'pastneg'},
    {key:'pastnegd', label:'過去否定（丁寧）', tag:'pastneg'},
    {key:'te', label:'て形', tag:'other'},
    {key:'adv', label:'副詞形', tag:'other'},
    {key:'hyp', label:'假設形', tag:'other'},
    {key:'naru', label:'〜くなる／〜になる', tag:'other'},
    {key:'sou', label:'〜そう', tag:'other'},
    {key:'sugiru', label:'〜すぎる', tag:'other'},
    {key:'sa', label:'〜さ', tag:'other'},
  ];

  let adjs_i = currentType !== 'na' ? I_ADJ : [];
  let adjs_na = currentType !== 'i' ? NA_ADJ : [];

  function tagClass(tag, isNA) {
    if (tag === 'base') return isNA ? 'ft-base-na' : 'ft-base';
    if (tag === 'neg') return 'ft-neg';
    if (tag === 'past') return 'ft-past';
    if (tag === 'pastneg') return 'ft-pastneg';
    return 'ft-other';
  }

  let iHtml = adjs_i.map((adj, idx) => {
    const rows = forms.map(f => {
      const ans = conjugateI(adj, f.key);
      const tc = tagClass(f.tag, false);
      return `<tr><td><span class="form-tag ${tc}">${f.label}</span></td><td style="font-size:1rem">${ans}</td></tr>`;
    }).join('');
    return `<div class="ref-table-wrap collapsed" style="margin-bottom:14px" data-idx="i-${idx}">
      <div class="ref-adj-header i" onclick="toggleRefCard(this)">
        <span class="ref-header-text">い形容詞 ／ ${adj.w}（${adj.r}）— ${adj.zh}</span>
        <span class="ref-toggle-icon">▼</span>
      </div>
      <table class="ref-table"><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');

  let naHtml = adjs_na.map((adj, idx) => {
    const rows = forms.map(f => {
      const ans = conjugateNA(adj, f.key);
      const tc = tagClass(f.tag, true);
      return `<tr><td><span class="form-tag ${tc}">${f.label}</span></td><td style="font-size:1rem">${ans}</td></tr>`;
    }).join('');
    return `<div class="ref-table-wrap collapsed" style="margin-bottom:14px" data-idx="na-${idx}">
      <div class="ref-adj-header na" onclick="toggleRefCard(this)">
        <span class="ref-header-text">な形容詞 ／ ${adj.w}（${adj.r}）— ${adj.zh}</span>
        <span class="ref-toggle-icon">▼</span>
      </div>
      <table class="ref-table"><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');

  area.innerHTML = `
    <input class="ref-search" id="ref-search" placeholder="搜尋形容詞（日文或中文）…" oninput="filterRef(this.value)">
    <div class="ref-controls">
      <button class="ref-control-btn" onclick="expandAllRef()">全部展開</button>
      <button class="ref-control-btn" onclick="collapseAllRef()">全部收合</button>
    </div>
    <div id="ref-content">${iHtml}${naHtml}</div>`;
}

function toggleRefCard(headerEl) {
  const wrap = headerEl.closest('.ref-table-wrap');
  wrap.classList.toggle('collapsed');
}

function expandAllRef() {
  document.querySelectorAll('#ref-content .ref-table-wrap').forEach(el => el.classList.remove('collapsed'));
}

function collapseAllRef() {
  document.querySelectorAll('#ref-content .ref-table-wrap').forEach(el => el.classList.add('collapsed'));
}

function filterRef(val) {
  const v = val.trim().toLowerCase();
  document.querySelectorAll('#ref-content .ref-table-wrap').forEach(el => {
    const header = el.querySelector('.ref-adj-header').textContent.toLowerCase();
    const matches = !v || header.includes(v);
    el.style.display = matches ? '' : 'none';
    if (v && matches) el.classList.remove('collapsed');
    if (!v) el.classList.add('collapsed');
  });
}


// ══════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════
const THEME_ORDER = ['light', 'dark', 'gray'];
const THEME_ICONS = {
  light: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>`,
  dark: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`,
  gray: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" stroke="none"></path></svg>`,
};
const THEME_TITLES = { light: '亮色模式', dark: '深色模式', gray: '黑白模式' };

function setTheme(t) {
  document.body.classList.remove('dark', 'grayscale');
  if (t === 'dark') document.body.classList.add('dark');
  else if (t === 'gray') document.body.classList.add('grayscale');

  const icon = document.getElementById('theme-icon');
  const btn = document.getElementById('theme-toggle');
  if (icon) icon.innerHTML = THEME_ICONS[t];
  if (btn) btn.title = THEME_TITLES[t];

  try { localStorage.setItem('adj-theme', t); } catch(e) {}
}

function cycleTheme() {
  let current = 'light';
  try { current = localStorage.getItem('adj-theme') || 'light'; } catch(e) {}
  const idx = THEME_ORDER.indexOf(current);
  const next = THEME_ORDER[(idx + 1) % THEME_ORDER.length];
  setTheme(next);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
(function(){
  try {
    const saved = localStorage.getItem('adj-theme');
    setTheme(saved || 'light');
  } catch(e) {
    setTheme('light');
  }
})();
restart();
</script>
